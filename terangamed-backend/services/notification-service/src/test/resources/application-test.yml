# Profil 'test' pour notification-service.
# Désactive Spring Cloud Config + Eureka + Kafka (mocked dans les tests).

spring:
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false

  config:
    # Quoter — sinon "optional:configserver:" sans valeur est mal parsé
    # comme un mapping YAML invalide.
    import: "optional:configserver:"

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Pas de connexion Kafka en test unitaire
  kafka:
    bootstrap-servers: localhost:0
    properties:
      schema.registry.url: http://localhost:0

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ""
          jwk-set-uri: http://localhost:65535/.well-known/jwks.json

eureka:
  client:
    enabled: false

terangamed:
  jpa:
    auditing:
      enabled: true
  swagger:
    oauth2:
      token-url: http://localhost:65535/token

logging:
  level:
    org.hibernate.SQL: WARN
    org.apache.kafka: WARN
