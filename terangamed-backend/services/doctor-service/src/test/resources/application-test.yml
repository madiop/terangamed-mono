spring:
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration/common

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ""
          jwk-set-uri: http://localhost:65535/.well-known/jwks.json

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

terangamed:
  jpa:
    auditing:
      enabled: true

  swagger:
    oauth2:
      authorization-url: http://localhost:65535/auth
      token-url: http://localhost:65535/token

  outbox:
    enabled: false

logging:
  level:
    org.hibernate.SQL: WARN
    org.testcontainers: WARN
