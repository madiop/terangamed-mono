server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: appointment-service

  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

  cloud:
    config:
      username: ${CONFIG_SERVER_USER:config}
      password: ${CONFIG_SERVER_PASSWORD:config}
      fail-fast: false

  datasource:
    url: ${APPOINTMENT_DB_URL:jdbc:postgresql://localhost:5432/appointment_db}
    username: ${POSTGRES_USER:terangamed}
    password: ${POSTGRES_PASSWORD:terangamed}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/terangamed/protocol/openid-connect/certs}

terangamed:
  security:
    jwt:
      principal-attribute: preferred_username
      resource-id: terangamed-backend

  swagger:
    oauth2:
      authorization-url: ${KEYCLOAK_AUTH_URL:http://localhost:8180/realms/terangamed/protocol/openid-connect/auth}
      token-url: ${KEYCLOAK_TOKEN_URL:http://localhost:8180/realms/terangamed/protocol/openid-connect/token}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://${EUREKA_USER:eureka}:${EUREKA_PASSWORD:eureka}@localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# Feign — timeouts (le circuit breaker Resilience4j gère retry/fallback)
feign:
  client:
    config:
      default:
        connectTimeout: 2000
        readTimeout: 5000
        loggerLevel: BASIC
  circuitbreaker:
    enabled: true

# Resilience4j — circuit breaker + retry pour les appels Feign inter-services
resilience4j:
  circuitbreaker:
    instances:
      patient-service:
        slidingWindowSize: 20
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
      doctor-service:
        slidingWindowSize: 20
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
  retry:
    instances:
      patient-service:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - feign.RetryableException
          - java.io.IOException
        ignoreExceptions:
          - com.terangamed.common.exception.ResourceNotFoundException
      doctor-service:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - feign.RetryableException
          - java.io.IOException
        ignoreExceptions:
          - com.terangamed.common.exception.ResourceNotFoundException

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    oauth:
      client-id: swagger-ui
      use-pkce-with-authorization-code-grant: true
      scopes: openid,profile,email
    csrf:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents,retries
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.terangamed: DEBUG

---
spring:
  config:
    activate:
      on-profile: docker
    import: optional:configserver:http://config-server:8888
  datasource:
    url: jdbc:postgresql://postgres:5432/appointment_db
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8180/realms/terangamed/protocol/openid-connect/certs

terangamed:
  swagger:
    oauth2:
      authorization-url: http://localhost:8180/realms/terangamed/protocol/openid-connect/auth
      token-url: http://localhost:8180/realms/terangamed/protocol/openid-connect/token

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:eureka}:${EUREKA_PASSWORD:eureka}@discovery-server:8761/eureka/
