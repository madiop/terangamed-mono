# Configuration des tests d'intégration (slice @DataJpaTest + Testcontainers).
# Datasource injectée automatiquement par @ServiceConnection (cf. AbstractPostgresIntegrationTest).

spring:
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration/common

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ""
          jwk-set-uri: http://localhost:65535/.well-known/jwks.json

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

# Auditing actif pour que @EnableJpaAuditing(auditorAwareRef = "terangamedAuditorAware")
# trouve son bean. JwtAuditorAware retourne Optional.empty() en l'absence de SecurityContext.
terangamed:
  jpa:
    auditing:
      enabled: true
  # Désactive le scheduler outbox en test : on ne veut pas qu'il tente de se
  # connecter à un Schema Registry inexistant. Les tests outbox dédiés peuvent
  # le ré-activer ponctuellement via @TestPropertySource.
  outbox:
    enabled: false

logging:
  level:
    org.hibernate.SQL: WARN
    org.testcontainers: WARN
    com.zaxxer.hikari: WARN
