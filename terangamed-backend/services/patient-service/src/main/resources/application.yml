server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: patient-service

  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

  cloud:
    config:
      username: ${CONFIG_SERVER_USER:config}
      password: ${CONFIG_SERVER_PASSWORD:config}
      fail-fast: false

  datasource:
    url: ${PATIENT_DB_URL:jdbc:postgresql://localhost:5432/patient_db}
    username: ${POSTGRES_USER:terangamed}
    password: ${POSTGRES_PASSWORD:terangamed}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Resource Server JWT Keycloak
  # On utilise UNIQUEMENT jwk-set-uri (pas issuer-uri) pour permettre le
  # déploiement Docker où le browser et le backend voient Keycloak via deux
  # hostnames différents (localhost:8180 vs keycloak:8180). Voir explication
  # détaillée dans config-repo/application-docker.yml. La signature reste
  # vérifiée via JWKS — seul un token signé par Keycloak est accepté.
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/terangamed/protocol/openid-connect/certs}

# Sécurité TerangaMed (lue par common-lib)
terangamed:
  security:
    jwt:
      principal-attribute: preferred_username
      resource-id: terangamed-backend

  swagger:
    oauth2:
      # URLs Keycloak utilisées par Swagger UI pour l'authentification
      authorization-url: ${KEYCLOAK_AUTH_URL:http://localhost:8180/realms/terangamed/protocol/openid-connect/auth}
      token-url: ${KEYCLOAK_TOKEN_URL:http://localhost:8180/realms/terangamed/protocol/openid-connect/token}

# Eureka client
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://${EUREKA_USER:eureka}:${EUREKA_PASSWORD:eureka}@localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# Springdoc OpenAPI / Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    oauth:
      client-id: swagger-ui
      use-pkce-with-authorization-code-grant: true
      scopes: openid,profile,email
    csrf:
      enabled: false
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
  show-actuator: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.terangamed: DEBUG
    org.hibernate.SQL: WARN

---
# Profil docker : hostnames résolus via DNS Docker
spring:
  config:
    activate:
      on-profile: docker
    import: optional:configserver:http://config-server:8888

  datasource:
    url: jdbc:postgresql://postgres:5432/patient_db

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8180/realms/terangamed/protocol/openid-connect/certs

terangamed:
  swagger:
    oauth2:
      authorization-url: http://localhost:8180/realms/terangamed/protocol/openid-connect/auth
      token-url: http://localhost:8180/realms/terangamed/protocol/openid-connect/token

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:eureka}:${EUREKA_PASSWORD:eureka}@discovery-server:8761/eureka/
