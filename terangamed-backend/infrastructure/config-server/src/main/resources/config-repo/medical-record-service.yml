# Configuration spécifique medical-record-service (override de config-repo/application.yml).

server:
  port: 8084

spring:
  datasource:
    url: ${MEDICAL_RECORD_DB_URL:jdbc:postgresql://localhost:5432/medical_record_db}
    hikari:
      pool-name: medical-record-service-pool
      maximum-pool-size: 10
      minimum-idle: 2

logging:
  level:
    com.terangamed.medical: DEBUG
    com.terangamed.medical.specification: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,flyway

# Feign clients — appels vers patient/doctor/appointment via Eureka load-balancer
feign:
  client:
    config:
      default:
        connect-timeout: 3000
        read-timeout: 5000
        logger-level: BASIC
  circuitbreaker:
    enabled: true

# Resilience4j — surcharges spécifiques pour les clients Feign de ce service
resilience4j:
  circuitbreaker:
    instances:
      patient-service:
        base-config: default
      doctor-service:
        base-config: default
      appointment-service:
        base-config: default
  retry:
    # Override des configs default pour AJOUTER feign.RetryableException
    # (la common application.yml ne référence que IOException pour rester
    # compatible avec les modules sans Feign).
    configs:
      default:
        retry-exceptions:
          - java.io.IOException
          - feign.RetryableException
    instances:
      patient-service:
        base-config: default
      doctor-service:
        base-config: default
      appointment-service:
        base-config: default
  timelimiter:
    instances:
      patient-service:
        base-config: default
      doctor-service:
        base-config: default
      appointment-service:
        base-config: default

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/medical_record_db

---
spring:
  config:
    activate:
      on-profile: dev
  flyway:
    locations: classpath:db/migration,classpath:db/migration/common,classpath:db/migration-dev
