server:
  port: ${SERVER_PORT:8761}

spring:
  application:
    name: discovery-server

  # Pattern moderne (Spring Boot 2.4+) : import optionnel du Config Server.
  # 'optional:' garantit que le service démarre même si le Config Server est down
  # (le Discovery Server doit être bootstrap-able indépendamment).
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

  cloud:
    config:
      username: ${CONFIG_SERVER_USER:config}
      password: ${CONFIG_SERVER_PASSWORD:config}
      fail-fast: false
      retry:
        initial-interval: 1000
        max-attempts: 3
        max-interval: 2000

  security:
    user:
      name: ${EUREKA_USER:eureka}
      password: ${EUREKA_PASSWORD:eureka}
      roles: EUREKA_CLIENT

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
    prefer-ip-address: false
  client:
    # Standalone : pas de cluster, donc pas d'auto-registration ni de fetch
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    # En dev/staging on désactive le mode protection pour voir les services
    # déregister rapidement. À PASSER À TRUE EN PROD.
    enable-self-preservation: ${EUREKA_SELF_PRESERVATION:false}
    eviction-interval-timer-in-ms: 5000
    response-cache-update-interval-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    root: INFO
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
    org.springframework.cloud: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

---
# Profil docker : hostname résolu par le DNS Docker, config-server accessible par nom de service
spring:
  config:
    activate:
      on-profile: docker
    import: optional:configserver:http://config-server:8888

eureka:
  instance:
    hostname: discovery-server
    prefer-ip-address: false
